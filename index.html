<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK FISH CLUB</title>

<link rel="stylesheet" href="style.css">

<style>
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,20,40,.7),rgba(0,20,40,.7)),
url("images/aquarium-bg.jpg");
background-size:cover;
background-position:center;
}

.hero-box{
background:rgba(0,0,0,.5);
padding:35px;
border-radius:20px;
box-shadow:0 0 25px cyan;
width:90%;
max-width:450px;
}

.hero h1{
color:#00ffff;
font-size:40px;
margin-bottom:10px;
}

.hero p{
color:white;
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
margin-bottom:15px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#00bfff;
color:white;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0099cc;
}
</style>

</head>

<body>

<div class="hero">

<div class="hero-box">

<h1>🐟 KK FISH CLUB</h1>

<p>Premium Aquarium Fish Store</p>

<input type="text" id="code" placeholder="Enter Confirmation Code">


<button onclick="alert('Button Works')">Continue</button>
</div>

</div>

<footer class="footer">
<h3>🐟 KK FISH CLUB</h3>
<p>Godavarikhani, Telangana</p>
<p>📞 9381687402</p>

</html>
