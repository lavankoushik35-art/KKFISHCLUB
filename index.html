<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK FISH CLUB</title>

<link rel="stylesheet" href="css/style.css">

<style>
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(rgba(0,20,40,.7),rgba(0,20,40,.7)),
url("images/aquarium-bg.jpg");
background-size:cover;
background-position:center;
}

.hero-box{
background:rgba(0,0,0,.45);
padding:35px;
border-radius:20px;
box-shadow:0 0 25px cyan;
width:90%;
max-width:450px;
}

.hero h1{
font-size:42px;
margin-bottom:10px;
color:#00ffff;
}

.hero p{
margin-bottom:20px;
font-size:18px;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#00bfff;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

button:hover{
background:#0099cc;
}
</style>

</head>

<body>

<div class="hero">

<div class="hero-box">

<h1>🐟 KK FISH CLUB</h1>

<p>Premium Aquarium Fish Store</p>

<input
type="text"
id="code"
placeholder="Enter Confirmation Code">

<button onclick="checkCode()">

Continue

</button>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
