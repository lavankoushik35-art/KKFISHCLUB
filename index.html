<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK FISH CLUB</title>

<style>
body{
    margin:0;
    background:#001f3f;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.box{
    width:320px;
    background:rgba(255,255,255,.08);
    padding:25px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 20px cyan;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:15px;
    font-size:16px;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00bfff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0099cc;
}
</style>

</head>

<body>

<div class="box">
<h2>🐟 KK FISH CLUB 🐟</h2>

<p>Enter Confirmation Code</p>

<input
id="code"
type="text"
placeholder="Enter Code">

<button onclick="checkCode()">Continue</button>

</div>

<script>

const codes=[
"KKFISHGDK",
"KKFISHHEAVEN",
"KKAQUA",
"KKAQUARIUMS",
"GDKHEAVENFISHES"
];

function checkCode(){

let value=document.getElementById("code").value.toUpperCase();

if(codes.includes(value)){

window.location.href="verify.html";

}else{

alert("Invalid Confirmation Code");

}

}

</script>

</body>
</html>
