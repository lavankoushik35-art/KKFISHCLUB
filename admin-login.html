<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#001f3f;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.login-box{
background:white;
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
text-align:center;
box-shadow:0 0 20px cyan;
}

input{
width:100%;
padding:12px;
margin:15px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#00bfff;
color:white;
border:none;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#0099cc;
}
</style>

</head>

<body>

<div class="login-box">

<h1>🔐 Admin Login</h1>

<p>Enter Admin ID</p>

<input
type="password"
id="adminid"
placeholder="Enter Admin ID">

<button onclick="adminLogin()">
Login
</button>

</div>

<script src="script.js"></script>

</body>
</html>
