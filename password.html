<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
body{
    margin:0;
    background:#001f3f;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:330px;
    padding:25px;
    background:rgba(255,255,255,0.08);
    border-radius:15px;
    text-align:center;
    color:white;
    box-shadow:0 0 20px cyan;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    font-size:16px;
    margin-top:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#00bfff;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0099cc;
}
</style>

</head>

<body>

<div class="box">

<h2>🔑 Customer Password</h2>

<input
type="password"
id="pass"
placeholder="Enter Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let password=document.getElementById("pass").value;

if(password==="kkfishmember"){

window.location.href="customer.html";

}else{

alert("Wrong Password");

}

}

</script>

</body>
</html>
