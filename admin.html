<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KK FISH CLUB - Admin Panel</title>

<link rel="stylesheet" href="style.css">

<style>
body{
font-family:Arial,sans-serif;
background:#001f3f;
color:white;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#012b52;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px cyan;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:#00bfff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin:5px;
}

button:hover{
background:#0088cc;
}
</style>

</head>

<body>

<div class="container">

<h1 align="center">🐟 KK FISH CLUB - Admin Panel</h1>

<div class="card">
<h2>Add New Fish</h2>

<input type="text" placeholder="Fish Name">

<input type="text" placeholder="Price">

<button>Add Fish</button>
</div>

<div class="card">
<h2>Edit Fish</h2>

<input type="text" placeholder="Fish Name">

<button>Edit Fish</button>
</div>

<div class="card">
<h2>Delete Fish</h2>

<input type="text" placeholder="Fish Name">

<button>Delete Fish</button>
</div>

<div class="card">
<h2>Add Offer</h2>

<input type="text" placeholder="Offer Name">

<button>Add Offer</button>
</div>

<div class="card">
<h2>Add Combo Offer</h2>

<input type="text" placeholder="Combo Offer">

<button>Add Combo</button>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
